<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>SFPD Reserve Hours</title>
<!-- iOS / iPadOS home-screen web app support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SFPD Hours">
<meta name="theme-color" content="#1a237e">
<link rel="apple-touch-icon" href="SFPD-Star.png">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232635;
    --border: #2e3148;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --radius: 10px;
    --navy: #1e2890;
    --gold: #f9cb25;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--navy);
    border-bottom: 3px solid var(--gold);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-left img {
    height: 44px;
    width: auto;
    display: block;
  }

  .header-left h1 {
    font-size: 18px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .year-nav {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .year-nav button {
    background: rgba(249,168,37,0.15);
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 6px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .year-nav button:hover { background: rgba(249,168,37,0.3); }

  #currentYear {
    font-size: 20px;
    font-weight: 800;
    min-width: 64px;
    text-align: center;
    color: var(--gold);
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: calc(100vh - 63px);
  }

  .left-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px;
    overflow-y: auto;
  }

  .right-panel {
    padding: 20px;
    overflow-y: auto;
  }

  /* ── Section titles ── */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Entry form ── */
  .entry-form {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .form-row.single { grid-template-columns: 1fr; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
  }

  input, select, textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; }
  select option { background: var(--surface2); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--navy);
    border: 2px solid var(--gold);
    color: var(--gold);
    width: 100%;
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  .btn-primary:hover { background: rgba(26,35,126,0.7); }

  .btn-danger {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--red);
    padding: 4px 9px;
    font-size: 12px;
    border-radius: 5px;
  }

  .btn-danger:hover { background: rgba(239,68,68,0.1); }

  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-secondary:hover { background: var(--border); }

  /* ── Monthly accordion ── */
  .month-group {
    margin-bottom: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .month-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .month-header:hover { background: var(--border); }
  .month-header .month-name { font-weight: 700; font-size: 13px; }
  .month-header .month-hours { font-size: 12px; color: var(--gold); font-weight: 700; }

  .month-entries { display: none; padding: 0 14px 10px; }
  .month-entries.open { display: block; }

  .entry-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 0;
    border-top: 1px solid var(--border);
    font-size: 12px;
  }

  .entry-row:first-child { border-top: 1px solid var(--border); margin-top: 6px; }

  .entry-task { color: var(--text); flex: 1; line-height: 1.4; }
  .entry-note { color: var(--muted); font-style: italic; }
  .entry-hrs { color: var(--gold); font-weight: 700; white-space: nowrap; }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }

  .checkbox-label:hover { border-color: var(--accent); background: var(--surface2); }

  .checkbox-label input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--gold);
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ── Stat cards ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--navy);
    border-radius: var(--radius);
    padding: 14px 16px;
  }

  .stat-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }

  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ── Chart ── */
  .chart-section, .table-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }

  .chart-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 14px;
  }

  .bar-row {
    display: grid;
    grid-template-columns: 76px 1fr 52px;
    align-items: center;
    gap: 10px;
    margin-bottom: 7px;
    font-size: 12px;
  }

  .bar-label { color: var(--muted); text-align: right; }

  .bar-track {
    background: var(--surface2);
    border-radius: 4px;
    height: 18px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--navy), #3949ab);
    border-right: 2px solid var(--gold);
    transition: width 0.4s ease;
    min-width: 2px;
  }

  .bar-value { color: var(--text); font-weight: 600; }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  thead th {
    text-align: left;
    padding: 6px 10px;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 1px solid var(--border);
  }

  tbody tr:hover td { background: var(--surface2); }

  tbody td {
    padding: 9px 10px;
    border-bottom: 1px solid rgba(46,49,72,0.5);
    vertical-align: top;
  }

  tbody tr:last-child td { border-bottom: none; }

  tfoot td {
    padding: 9px 10px;
    font-weight: 700;
    border-top: 2px solid var(--border);
    color: var(--gold);
  }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    background: rgba(26,35,126,0.4);
    color: #90caf9;
  }

  /* ── Report actions ── */
  .report-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 40px 24px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    z-index: 999;
  }

  #toast.show { opacity: 1; transform: translateY(0); }

  /* ── Responsive: phones & small tablets ── */
  @media (max-width: 820px) {
    header {
      padding: 0 16px;
      padding-top: env(safe-area-inset-top);
      height: auto;
      min-height: 56px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .header-left h1 { font-size: 15px; }
    .header-left img { height: 36px; }

    .layout {
      display: block;
      min-height: 0;
    }

    .left-panel {
      border-right: none;
      border-bottom: 2px solid var(--border);
      padding: 16px;
    }

    .right-panel { padding: 16px; }

    /* Stack the stat cards two-up on phones */
    .stats-grid { grid-template-columns: 1fr 1fr; }

    /* Larger touch targets for inputs */
    input, select, textarea { font-size: 16px; padding: 11px 12px; }
    .btn { padding: 12px 16px; }
    .checkbox-label { padding: 11px 12px; }

    /* Let wide tables scroll horizontally instead of squishing */
    .table-section table { min-width: 560px; }
    .table-section > div[id$="Table"] { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* Report actions wrap and go full-width-friendly */
    .report-actions .btn { flex: 1 1 auto; }

    .modal { width: 95vw; max-height: 90vh; }
    .month-picker { flex-direction: column; }
    .report-preview { overflow-x: auto; }
  }

  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr; }
    .header-left h1 { font-size: 13px; letter-spacing: 0.3px; }
  }

  /* ── Print ── */
  @media print {
    body.printing-monthly * { display: none !important; }
    body.printing-monthly #monthlyReportPrint { display: block !important; }

    #monthlyReportPrint {
      display: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #000;
      padding: 32px;
    }

    #monthlyReportPrint .rpt-header {
      display: flex !important;
      align-items: center;
      gap: 16px;
      border-bottom: 3px solid #1a237e;
      padding-bottom: 16px;
      margin-bottom: 20px;
    }

    #monthlyReportPrint .rpt-header img { height: 60px; }

    #monthlyReportPrint .rpt-header-text h2 { font-size: 22px; color: #1a237e; margin: 0; }
    #monthlyReportPrint .rpt-header-text p  { font-size: 13px; color: #555; margin: 2px 0 0; }

    #monthlyReportPrint .rpt-stats {
      display: flex !important;
      gap: 24px;
      margin-bottom: 20px;
    }

    #monthlyReportPrint .rpt-stat { text-align: center; }
    #monthlyReportPrint .rpt-stat-val { font-size: 24px; font-weight: 800; color: #1a237e; }
    #monthlyReportPrint .rpt-stat-lbl { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }

    #monthlyReportPrint table { width: 100%; border-collapse: collapse; font-size: 12px; }
    #monthlyReportPrint thead th { background: #1a237e !important; color: #fff !important; padding: 7px 10px; text-align: left; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    #monthlyReportPrint tbody td { padding: 7px 10px; border-bottom: 1px solid #ddd; }
    #monthlyReportPrint tbody tr:nth-child(even) td { background: #f5f5f5; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    #monthlyReportPrint tfoot td { padding: 7px 10px; font-weight: 700; border-top: 2px solid #1a237e; color: #1a237e; }
    #monthlyReportPrint .rpt-footer { margin-top: 24px; font-size: 10px; color: #999; border-top: 1px solid #ddd; padding-top: 8px; }
    #monthlyReportPrint .flag-badge { font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 700; }
    #monthlyReportPrint .flag-medical { background: #fde8e8; color: #c0392b; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    #monthlyReportPrint .flag-loa { background: #fef9e7; color: #b7950b; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  /* ── Monthly Report Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 540px;
    max-width: 95vw;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--navy);
  }

  .modal-header h2 { font-size: 15px; font-weight: 700; color: var(--gold); }

  .modal-close {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 2px 6px;
  }

  .modal-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
  }

  .modal-footer {
    display: flex;
    gap: 10px;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .month-picker {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .month-picker select, .month-picker input {
    flex: 1;
  }

  .report-preview {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
  }

  .report-preview h3 {
    font-size: 14px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .preview-stats {
    display: flex;
    gap: 20px;
    margin-bottom: 14px;
  }

  .preview-stat-val { font-size: 22px; font-weight: 800; color: var(--gold); line-height: 1; }
  .preview-stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  .preview-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
  .preview-table th { text-align: left; padding: 5px 8px; font-size: 10px; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .preview-table td { padding: 7px 8px; border-bottom: 1px solid rgba(46,49,72,0.4); vertical-align: top; }
  .preview-table tfoot td { font-weight: 700; color: var(--gold); border-top: 2px solid var(--border); border-bottom: none; }

  #monthlyReportPrint { display: none; }
</style>
</head>

<div class="layout">

  <!-- LEFT: Entry form + monthly log -->
  <div class="left-panel">
    <div class="section-title">Log Hours</div>

    <div class="entry-form">
      <div class="form-row">
        <div>
          <label>Name</label>
          <input type="text" id="entryName" placeholder="e.g. John Smith">
        </div>
        <div>
          <label>Star #</label>
          <input type="text" id="entryStar" placeholder="e.g. 1234">
        </div>
      </div>
      <div class="form-row">
        <div>
          <label>Month</label>
          <select id="entryMonth">
            <option value="0">January</option>
            <option value="1">February</option>
            <option value="2">March</option>
            <option value="3">April</option>
            <option value="4">May</option>
            <option value="5">June</option>
            <option value="6">July</option>
            <option value="7">August</option>
            <option value="8">September</option>
            <option value="9">October</option>
            <option value="10">November</option>
            <option value="11">December</option>
          </select>
        </div>
        <div>
          <label>Hours</label>
          <input type="number" id="entryHours" min="0.25" step="0.25" placeholder="e.g. 4.5">
        </div>
      </div>
      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" id="entryMedical">
          <span>Medical Leave</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="entryLOA">
          <span>Leave of Absence</span>
        </label>
      </div>
      <div class="form-row single">
        <div>
          <label>Task / Duty</label>
          <input type="text" id="entryTask" placeholder="e.g. Patrol, Training, Community Event…" list="taskSuggestions">
          <datalist id="taskSuggestions"></datalist>
        </div>
      </div>
      <div class="form-row single">
        <div>
          <label>Notes (optional)</label>
          <textarea id="entryNote" placeholder="Location, supervisor, details…"></textarea>

      <button class="btn btn-primary" onclick="addEntry()">+ Add Entry</button>

    <div class="section-title">Monthly Log &mdash; <span id="monthLogYear"></span></div>
    <div id="monthlyLog"></div>
  </div>

  <!-- RIGHT: Annual summary -->
  <div class="right-panel">
    <div class="section-title">Annual Summary &mdash; <span id="summaryYear"></span></div>

    <div class="stats-grid" id="statsGrid"></div>

<!-- Hidden print-only monthly report -->
<div id="monthlyReportPrint"></div>

<script>
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun',
                      'Jul','Aug','Sep','Oct','Nov','Dec'];

let currentYear = new Date().getFullYear();

function loadData() {
  try { return JSON.parse(localStorage.getItem('sfpd_hours_v1') || '{}'); }
  catch { return {}; }
}

function saveData(data) {
  localStorage.setItem('sfpd_hours_v1', JSON.stringify(data));
}

function yearEntries(year) {
  return loadData()[year] || [];
}

function addEntry() {
  const month = parseInt(document.getElementById('entryMonth').value);
  const hours = parseFloat(document.getElementById('entryHours').value);
  const task  = document.getElementById('entryTask').value.trim();
  const note  = document.getElementById('entryNote').value.trim();
  const name    = document.getElementById('entryName').value.trim();
  const star    = document.getElementById('entryStar').value.trim();
  const medical = document.getElementById('entryMedical').checked;
  const loa     = document.getElementById('entryLOA').checked;

  if (!task)                { flash('Enter a task or duty.', true); return; }
  if (!hours || hours <= 0) { flash('Enter valid hours.', true); return; }

  const data = loadData();
  if (!data[currentYear]) data[currentYear] = [];
  data[currentYear].push({ id: Date.now(), month, hours, task, note, name, star, medical, loa });
  saveData(data);

  document.getElementById('entryHours').value = '';
  document.getElementById('entryNote').value  = '';
  document.getElementById('entryMedical').checked = false;
  document.getElementById('entryLOA').checked     = false;
  flash(`Added ${fmtHrs(hours)} — ${task}`);
  render();
}

function deleteEntry(id) {
  const data = loadData();
  if (data[currentYear]) {
    data[currentYear] = data[currentYear].filter(e => e.id !== id);
    saveData(data);
  }
  render();
}

function changeYear(d) {
  currentYear += d;
  render();
}

function render() {
  document.getElementById('currentYear').textContent    = currentYear;
  document.getElementById('monthLogYear').textContent   = currentYear;
  document.getElementById('summaryYear').textContent    = currentYear;

  const entries = yearEntries(currentYear);
  renderMonthlyLog(entries);
  renderStats(entries);
  renderMonthChart(entries);
  renderTaskTable(entries);
  renderAllEntries(entries);
  updateSuggestions();

  if (currentYear === new Date().getFullYear()) {
    document.getElementById('entryMonth').value = new Date().getMonth();
  }
}

function renderMonthlyLog(entries) {
  const el = document.getElementById('monthlyLog');
  if (!entries.length) {
    el.innerHTML = `<div class="empty-state">No entries logged for ${currentYear}.</div>`;
    return;
  }

  const byMonth = {};
  entries.forEach(e => { (byMonth[e.month] = byMonth[e.month] || []).push(e); });

  let html = '';
  Object.keys(byMonth).sort((a,b) => b - a).forEach(m => {
    const list  = byMonth[m];
    const total = list.reduce((s,e) => s + e.hours, 0);
    const mid   = `m_${m}`;
    html += `<div class="month-group">
      <div class="month-header" onclick="toggleMonth('${mid}')">
        <span class="month-name">${MONTHS[m]}</span>
        <span class="month-hours">${fmtHrs(total)}</span>
      </div>
      <div class="month-entries" id="${mid}">`;
    list.sort((a,b) => b.id - a.id).forEach(e => {
      html += `<div class="entry-row">
        <div class="entry-task">
          ${(e.name || e.star) ? `<div style="font-weight:700;color:var(--gold)">${[e.name, e.star ? `★ ${e.star}` : ''].filter(Boolean).join(' &nbsp;·&nbsp; ')}</div>` : ''}
          <div>${e.task}</div>
          ${(e.medical || e.loa) ? `<div style="display:flex;gap:6px;margin-top:3px">${e.medical ? `<span style="background:rgba(239,68,68,0.15);color:var(--red);font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px">Medical Leave</span>` : ''}${e.loa ? `<span style="background:rgba(234,179,8,0.15);color:var(--yellow);font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px">LOA</span>` : ''}</div>` : ''}
          ${e.note ? `<div class="entry-note">${e.note}</div>` : ''}
        </div>
        <span class="entry-hrs">${fmtHrs(e.hours)}</span>
        <button class="btn btn-danger" onclick="deleteEntry(${e.id})">✕</button>
      </div>`;
    });
    html += `</div></div>`;
  });

  el.innerHTML = html;

  const cur = document.getElementById(`m_${new Date().getMonth()}`);
  if (cur) cur.classList.add('open');
}

function toggleMonth(id) {
  document.getElementById(id)?.classList.toggle('open');
}

function renderStats(entries) {
  const total    = entries.reduce((s,e) => s + e.hours, 0);
  const activeMo = new Set(entries.map(e => e.month)).size;
  const avg      = activeMo ? total / activeMo : 0;
  const tasks    = new Set(entries.map(e => e.task)).size;

  const byMonth  = {};
  entries.forEach(e => { byMonth[e.month] = (byMonth[e.month]||0) + e.hours; });
  const best = Object.entries(byMonth).sort((a,b) => b[1]-a[1])[0];

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Hours</div>
      <div class="stat-value">${fmtHrs(total)}</div>
      <div class="stat-sub">${entries.length} entries</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active Months</div>
      <div class="stat-value">${activeMo}</div>
      <div class="stat-sub">of 12</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg / Month</div>
      <div class="stat-value">${fmtHrs(avg)}</div>
      <div class="stat-sub">active months only</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Duty Types</div>
      <div class="stat-value">${tasks}</div>
      <div class="stat-sub">unique tasks</div>
    </div>
    ${best ? `<div class="stat-card">
      <div class="stat-label">Busiest Month</div>
      <div class="stat-value" style="font-size:20px">${MONTHS_SHORT[best[0]]}</div>
      <div class="stat-sub">${fmtHrs(best[1])}</div>
    </div>` : ''}
  `;
}

function renderMonthChart(entries) {
  const byMonth = {};
  entries.forEach(e => { byMonth[e.month] = (byMonth[e.month]||0) + e.hours; });
  const maxVal = Math.max(...Object.values(byMonth), 1);

  let html = '';
  for (let m = 0; m < 12; m++) {
    const hrs = byMonth[m] || 0;
    const pct = (hrs / maxVal) * 100;
    html += `<div class="bar-row">
      <span class="bar-label">${MONTHS_SHORT[m]}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <span class="bar-value">${hrs ? fmtHrs(hrs) : '—'}</span>
    </div>`;
  }
  document.getElementById('monthChart').innerHTML = html;
}

function renderTaskTable(entries) {
  const el = document.getElementById('taskTable');
  if (!entries.length) { el.innerHTML = '<div class="empty-state">No data.</div>'; return; }

  const byTask = {};
  entries.forEach(e => {
    if (!byTask[e.task]) byTask[e.task] = { hours: 0, count: 0 };
    byTask[e.task].hours += e.hours;
    byTask[e.task].count++;
  });

  const total  = entries.reduce((s,e) => s + e.hours, 0);
  const sorted = Object.entries(byTask).sort((a,b) => b[1].hours - a[1].hours);

  let html = `<table><thead><tr>
    <th>Task / Duty</th>
    <th style="text-align:right">Entries</th>
    <th style="text-align:right">Hours</th>
    <th style="text-align:right">% of Total</th>
  </tr></thead><tbody>`;

  sorted.forEach(([task, d]) => {
    const pct = total ? ((d.hours / total) * 100).toFixed(1) : 0;
    html += `<tr>
      <td>${task}</td>
      <td style="text-align:right;color:var(--muted)">${d.count}</td>
      <td style="text-align:right;color:var(--gold);font-weight:700">${fmtHrs(d.hours)}</td>
      <td style="text-align:right"><span class="pill">${pct}%</span></td>
    </tr>`;
  });

  html += `</tbody><tfoot><tr>
    <td>Total</td>
    <td style="text-align:right;color:var(--muted)">${entries.length}</td>
    <td style="text-align:right">${fmtHrs(total)}</td>
    <td></td>
  </tr></tfoot></table>`;

  el.innerHTML = html;
}

function renderAllEntries(entries) {
  const el = document.getElementById('allEntriesTable');
  if (!entries.length) { el.innerHTML = '<div class="empty-state">No entries yet.</div>'; return; }

  const sorted = [...entries].sort((a,b) => a.month - b.month || a.id - b.id);
  const total  = sorted.reduce((s,e) => s + e.hours, 0);

  let html = `<table><thead><tr>
    <th>Month</th><th>Name</th><th>Star #</th><th>Task / Duty</th><th>Notes</th><th>Status</th><th style="text-align:right">Hours</th>
  </tr></thead><tbody>`;

  sorted.forEach(e => {
    const flags = [e.medical ? 'Medical Leave' : '', e.loa ? 'LOA' : ''].filter(Boolean).join(', ');
    html += `<tr>
      <td style="white-space:nowrap;color:var(--muted)">${MONTHS[e.month]}</td>
      <td style="white-space:nowrap">${e.name || '—'}</td>
      <td style="color:var(--gold);font-weight:700">${e.star || '—'}</td>
      <td>${e.task}</td>
      <td style="color:var(--muted);font-style:italic">${e.note || '—'}</td>
      <td style="color:var(--red);font-size:12px">${flags || '—'}</td>
      <td style="text-align:right;color:var(--gold);font-weight:700">${fmtHrs(e.hours)}</td>
    </tr>`;
  });

  html += `</tbody><tfoot><tr>
    <td colspan="6">Total</td>
    <td style="text-align:right">${fmtHrs(total)}</td>
  </tr></tfoot></table>`;

  el.innerHTML = html;
}

function updateSuggestions() {
  const data = loadData();
  const all  = new Set();
  Object.values(data).forEach(arr => arr.forEach(e => all.add(e.task)));
  document.getElementById('taskSuggestions').innerHTML = [...all].map(t => `<option value="${t}">`).join('');
}

function exportJSON() {
  const data = loadData();
  if (!Object.keys(data).length) { flash('No data to export.', true); return; }

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: `sfpd-reserve-hours-backup.json` });
  a.click();
  URL.revokeObjectURL(url);

  const total = Object.values(data).reduce((s, arr) => s + arr.length, 0);
  flash(`Backup saved — ${total} entries across ${Object.keys(data).length} year(s)`);
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const incoming = JSON.parse(e.target.result);

      // Basic validation
      if (typeof incoming !== 'object' || Array.isArray(incoming)) throw new Error();
      for (const [yr, arr] of Object.entries(incoming)) {
        if (isNaN(yr) || !Array.isArray(arr)) throw new Error();
      }

      const existing = loadData();
      let added = 0;

      // Merge: add entries that don't already exist (matched by id)
      for (const [yr, arr] of Object.entries(incoming)) {
        if (!existing[yr]) existing[yr] = [];
        const existingIds = new Set(existing[yr].map(e => e.id));
        const newEntries  = arr.filter(e => !existingIds.has(e.id));
        existing[yr].push(...newEntries);
        added += newEntries.length;
      }

      saveData(existing);
      render();
      flash(`Imported ${added} new entr${added === 1 ? 'y' : 'ies'}`);
    } catch {
      flash('Invalid backup file.', true);
    }

    // Reset input so the same file can be re-imported if needed
    event.target.value = '';
  };
  reader.readAsText(file);
}

function exportCSV() {
  const entries = yearEntries(currentYear);
  if (!entries.length) { flash('No data to export.', true); return; }

  const rows = [['Year','Month','Name','Star #','Task','Notes','Medical Leave','Leave of Absence','Hours']];
  [...entries].sort((a,b) => a.month - b.month).forEach(e => {
    rows.push([currentYear, MONTHS[e.month], `"${(e.name||'').replace(/"/g,'""')}"`, e.star||'', `"${e.task.replace(/"/g,'""')}"`, `"${(e.note||'').replace(/"/g,'""')}"`, e.medical ? 'Yes' : 'No', e.loa ? 'Yes' : 'No', e.hours]);
  });

  const csv  = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: `sfpd-reserve-hours-${currentYear}.csv` });
  a.click();
  URL.revokeObjectURL(url);
  flash(`Exported ${entries.length} entries`);
}

function fmtHrs(h) {
  if (!h) return '0h';
  const w = Math.floor(h);
  const m = Math.round((h - w) * 60);
  return m ? `${w}h ${m}m` : `${w}h`;
}

function flash(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = error ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Monthly Report ──

function openMonthlyReport() {
  const now = new Date();
  const ms = document.getElementById('rptMonth');
  ms.innerHTML = MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
  ms.value = now.getMonth();
  document.getElementById('rptYear').value = now.getFullYear();
  ms.onchange = previewMonthlyReport;
  document.getElementById('rptYear').onchange = previewMonthlyReport;
  document.getElementById('monthlyReportModal').classList.add('open');
  previewMonthlyReport();
}

function closeMonthlyReport() {
  document.getElementById('monthlyReportModal').classList.remove('open');
}

function getMonthEntries() {
  const month = parseInt(document.getElementById('rptMonth').value);
  const year  = parseInt(document.getElementById('rptYear').value);
  return { month, year, entries: (loadData()[year] || []).filter(e => e.month === month) };
}

function previewMonthlyReport() {
  const { month, year, entries } = getMonthEntries();
  const el = document.getElementById('reportPreview');

  if (!entries.length) {
    el.innerHTML = `<div style="color:var(--muted);text-align:center;padding:20px">No entries for ${MONTHS[month]} ${year}.</div>`;
    return;
  }

  const total   = entries.reduce((s, e) => s + e.hours, 0);
  const medical = entries.filter(e => e.medical).length;
  const loa     = entries.filter(e => e.loa).length;

  let rows = '';
  [...entries].sort((a, b) => a.id - b.id).forEach(e => {
    const flags = [
      e.medical ? `<span style="background:rgba(239,68,68,0.15);color:var(--red);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px">Med</span>` : '',
      e.loa     ? `<span style="background:rgba(234,179,8,0.15);color:var(--yellow);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px">LOA</span>` : ''
    ].filter(Boolean).join(' ');
    rows += `<tr>
      <td>${e.name || '—'}</td>
      <td>${e.star || '—'}</td>
      <td>${e.task}</td>
      <td>${e.note || '—'}</td>
      <td>${flags || '—'}</td>
      <td style="text-align:right;color:var(--gold);font-weight:700">${fmtHrs(e.hours)}</td>
    </tr>`;
  });

  el.innerHTML = `
    <h3>${MONTHS[month]} ${year} — Hours Report</h3>
    <div class="preview-stats">
      <div><div class="preview-stat-val">${fmtHrs(total)}</div><div class="preview-stat-lbl">Total Hours</div></div>
      <div><div class="preview-stat-val">${entries.length}</div><div class="preview-stat-lbl">Entries</div></div>
      ${medical ? `<div><div class="preview-stat-val" style="color:var(--red)">${medical}</div><div class="preview-stat-lbl">Medical Leave</div></div>` : ''}
      ${loa     ? `<div><div class="preview-stat-val" style="color:var(--yellow)">${loa}</div><div class="preview-stat-lbl">Leave of Absence</div></div>` : ''}
    </div>
    <table class="preview-table">
      <thead><tr><th>Name</th><th>Star #</th><th>Task / Duty</th><th>Notes</th><th>Status</th><th style="text-align:right">Hours</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td colspan="5">Total</td><td style="text-align:right">${fmtHrs(total)}</td></tr></tfoot>
    </table>`;
}

function buildPrintReport(month, year, entries) {
  const total   = entries.reduce((s, e) => s + e.hours, 0);
  const medical = entries.filter(e => e.medical).length;
  const loa     = entries.filter(e => e.loa).length;
  const printed = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  const starImg = document.querySelector('header img');
  const imgTag  = starImg ? `<img src="${starImg.src}" alt="SFPD">` : '';

  let rows = '';
  [...entries].sort((a, b) => a.id - b.id).forEach(e => {
    const flags = [
      e.medical ? `<span class="flag-badge flag-medical">Medical Leave</span>` : '',
      e.loa     ? `<span class="flag-badge flag-loa">LOA</span>` : ''
    ].filter(Boolean).join(' ');
    rows += `<tr>
      <td>${e.name || '—'}</td>
      <td>${e.star || '—'}</td>
      <td>${e.task}</td>
      <td>${e.note || '—'}</td>
      <td>${flags || '—'}</td>
      <td style="text-align:right;font-weight:700">${fmtHrs(e.hours)}</td>
    </tr>`;
  });

  return `
    <div class="rpt-header">
      ${imgTag}
      <div class="rpt-header-text">
        <h2>SFPD Reserve Hours — Monthly Report</h2>
        <p>${MONTHS[month]} ${year}</p>
      </div>
    </div>
    <div class="rpt-stats">
      <div class="rpt-stat"><div class="rpt-stat-val">${fmtHrs(total)}</div><div class="rpt-stat-lbl">Total Hours</div></div>
      <div class="rpt-stat"><div class="rpt-stat-val">${entries.length}</div><div class="rpt-stat-lbl">Entries</div></div>
      ${medical ? `<div class="rpt-stat"><div class="rpt-stat-val">${medical}</div><div class="rpt-stat-lbl">Medical Leave</div></div>` : ''}
      ${loa     ? `<div class="rpt-stat"><div class="rpt-stat-val">${loa}</div><div class="rpt-stat-lbl">Leave of Absence</div></div>` : ''}
    </div>
    <table>
      <thead><tr><th>Name</th><th>Star #</th><th>Task / Duty</th><th>Notes</th><th>Status</th><th style="text-align:right">Hours</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td colspan="5">Total</td><td style="text-align:right">${fmtHrs(total)}</td></tr></tfoot>
    </table>
    <div class="rpt-footer">Generated ${printed} &nbsp;|&nbsp; SFPD Reserve Hours Tracker</div>`;
}

function printMonthlyReport() {
  const { month, year, entries } = getMonthEntries();
  if (!entries.length) { flash(`No entries for ${MONTHS[month]} ${year}.`, true); return; }
  document.getElementById('monthlyReportPrint').innerHTML = buildPrintReport(month, year, entries);
  document.body.classList.add('printing-monthly');
  window.print();
  document.body.classList.remove('printing-monthly');
}

document.getElementById('monthlyReportModal').addEventListener('click', function(e) {
  if (e.target === this) closeMonthlyReport();
});

render();

// ── Register service worker for offline use ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
